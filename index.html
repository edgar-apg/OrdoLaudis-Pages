<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OrdoLaudis — Liturgia y Misal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Cinzel:wght@400;600&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css?v=10">
</head>
<body>

<header>
  <p class="site-label">Oración — Iglesia Católica</p>
  <div class="cross-mark">✠</div>
  <h1>OrdoLaudis</h1>
  <p class="subtitle">Liturgia de las Horas y Misal diario</p>
</header>

<main>
  <section class="mode-tabs" aria-label="Tipo de consulta">
    <button class="active" data-mode="liturgia">Liturgia de las Horas</button>
    <button data-mode="misal">Misal</button>
  </section>

  <section class="section controls-section">
    <div class="section-header static">
      <span class="section-title">Fecha</span>
    </div>
    <div class="controls">
      <label class="date-label" for="date">Selecciona el día</label>
      <input id="date" type="date">
      <button id="today" type="button">Hoy</button>
    </div>
  </section>

  <nav id="liturgia-tabs" class="tabs" aria-label="Horas litúrgicas">
    <button class="active" data-key="invitatorio">Invitatorio</button>
    <button data-key="oficio">Oficio</button>
    <button data-key="laudes">Laudes</button>
    <button data-key="tercia">Tercia</button>
    <button data-key="sexta">Sexta</button>
    <button data-key="nona">Nona</button>
    <button data-key="visperas">Vísperas</button>
    <button data-key="completas">Completas</button>
  </nav>

  <nav id="misal-tabs" class="tabs hidden" aria-label="Partes del Misal">
    <button class="active" data-key="ritos">Ritos Iniciales</button>
    <button data-key="palabra">Liturgia de la Palabra</button>
    <button data-key="eucaristica">Liturgia Eucarística</button>
  </nav>

  <section class="viewer-wrap">
    <iframe id="viewer" title="Consulta litúrgica"></iframe>
  </section>
</main>

<footer>
  OrdoLaudis · Liturgia y Misal · Laudare, Benedicere, Praedicare — in Rete.
</footer>

<script src="app.js"></script>
</body>
</html>
